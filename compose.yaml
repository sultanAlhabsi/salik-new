services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salik
      POSTGRES_USER: salik
      POSTGRES_PASSWORD: salik_local_only
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salik -d salik"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - salik-postgres:/var/lib/postgresql/data

volumes:
  salik-postgres:
